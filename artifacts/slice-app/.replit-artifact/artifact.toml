kind = "web"
previewPath = "/"
title = "Slice — Bill Splitter"
version = "1.0.0"
id = "artifacts/slice-app"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 21284

[services.development]
run = "pnpm --filter @workspace/slice-app run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/slice-app", "run", "build" ]
publicDir = "artifacts/slice-app/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "21284"
BASE_PATH = "/"
